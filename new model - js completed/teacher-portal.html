<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Portal – Certificates HQ</title>
  <link rel="stylesheet" href="style-portal.css" />
</head>
<body>
  <div class="portal">
    <header>
      <h1> Teacher Portal</h1>
      <div class="header-right">
        <span id="user-name"></span>
        <button onclick="logout()" class="btn-logout">Logout</button>
      </div>
    </header>

    <nav class="portal-nav">
      <button class="nav-tab active" data-tab="requests">Pending Requests</button>
      <button class="nav-tab" data-tab="approved">Approved Requests</button>
      <button class="nav-tab" data-tab="students">My Students</button>
      <button class="nav-tab" data-tab="profile">Profile</button>
    </nav>

    <!-- Pending requests -->
    <section class="tab-panel active" data-panel="requests">
      <div class="panel-header">
        <h2>Pending Requests to Approve</h2>
      </div>
      <div id="pending-list" class="card-grid"></div>
      <p id="pending-empty" class="empty-state">No pending requests.</p>
    </section>

    <!-- Approved requests -->
    <section class="tab-panel" data-panel="approved">
      <div class="panel-header">
        <h2>Approved Requests</h2>
      </div>
      <div id="approved-list" class="card-grid"></div>
      <p id="approved-empty" class="empty-state">No approved requests yet.</p>
    </section>

    <!-- Students -->
    <section class="tab-panel" data-panel="students">
      <div class="panel-header">
        <h2>My Students</h2>
      </div>
      <div id="students-list" class="card-grid"></div>
      <p id="students-empty" class="empty-state">No students assigned yet.</p>
    </section>

    <!-- Profile -->
    <section class="tab-panel" data-panel="profile">
      <div class="panel-header">
        <h2>Profile</h2>
      </div>
      <div class="profile-form">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="t-name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="t-email" />
        </div>
        <div class="form-group">
          <label>Institute</label>
          <input type="text" id="t-institute" />
        </div>
        <button class="btn-primary" id="save-t-profile-btn">Save Profile</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
  <script src="teacher-portal.js"></script>
